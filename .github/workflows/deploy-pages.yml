name: Deploy to GitHub Pages

# Builds nothing by default — just publishes the repo's static files.
# On the FIRST run, `configure-pages` with `enablement: true` turns on
# GitHub Pages for this repo automatically (using the workflow's token),
# so there are no manual clicks in repo Settings and no personal tokens.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# These permissions are what let the run enable + deploy Pages on its own.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload the site. For a plain static site this is the repo root ('.').
      # For a build step (Vite/Next/Astro/etc.), add the build above and set
      # `path` to the build output, e.g. './dist'. See references/github-pages.md.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
